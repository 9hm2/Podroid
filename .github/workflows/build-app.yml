name: Build app

# Manually-triggered build of the full Podroid app. Cross-compiles the kernel,
# Kali rootfs, QEMU and the on-device llama.cpp AI engine in parallel jobs,
# then assembles the APK in a final job that downloads each artifact.
#
# Wall-clock budget on ubuntu-latest:
#   - kernel+initramfs : ~15 min  (Docker layer-cached)
#   - rootfs (Kali)    : ~5 min   (debootstrap cached)
#   - qemu             : ~25 min  first run, ~3 min cached
#   - ai (llama.cpp)   : ~10 min  first run, ~2 min cached
#   - apk              : ~5 min
# Parallel = ~25 min wall-clock first run, ~10 min cached.
#
# Buildx GHA cache (`type=gha,scope=...`) persists Docker layers across runs
# so a green first run keeps the second under 15 minutes total.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build
        type: string
        default: kali-nethunter
      build_type:
        description: APK build type
        type: choice
        options:
          - debug
          - release
        default: debug
      release_tag:
        description: "Publish a Release with this tag (leave empty = artifact only)"
        type: string
        default: ""

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ── Independent native-binary builds (parallel) ───────────────────────────

  initramfs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.branch }}" }
      - run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build kernel + initramfs
        run: ./build-all.sh initramfs
      - uses: actions/upload-artifact@v4
        with:
          name: assets-initramfs
          path: |
            app/src/main/assets/vmlinuz-virt
            app/src/main/assets/initrd.img
          if-no-files-found: error

  rootfs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.branch }}" }
      - run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Kali rootfs
        run: ./build-all.sh rootfs
      - uses: actions/upload-artifact@v4
        with:
          name: assets-rootfs
          path: app/src/main/assets/alpine-rootfs.squashfs
          if-no-files-found: error

  qemu:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.branch }}" }
      - run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build QEMU + bridge + launcher
        run: ./build-all.sh qemu
      - uses: actions/upload-artifact@v4
        with:
          name: jnilibs-qemu
          path: |
            app/src/main/jniLibs/arm64-v8a/libqemu-system-aarch64.so
            app/src/main/jniLibs/arm64-v8a/libslirp.so
            app/src/main/jniLibs/arm64-v8a/libpodroid-bridge.so
            app/src/main/jniLibs/arm64-v8a/libpodroid-launcher.so
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: assets-qemu
          path: app/src/main/assets/qemu/
          if-no-files-found: error

  ai:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Soft-fail: if the llama.cpp upstream pin breaks, the apk job still
    # ships — the app handles missing libllama-server.so by disabling the
    # AI engine toggle with a clear error in the Settings panel. Easier
    # to land a working APK and fix the AI build incrementally than to
    # gate the whole release on it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.branch }}" }
      - run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
      - uses: docker/setup-buildx-action@v3
      - if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build llama-server (Vulkan + CPU/NEON)
        run: ./build-all.sh ai
      - uses: actions/upload-artifact@v4
        with:
          name: jnilibs-ai
          path: app/src/main/jniLibs/arm64-v8a/libllama-server.so
          if-no-files-found: warn

  # ── Final APK assembly job ────────────────────────────────────────────────

  apk:
    needs: [initramfs, rootfs, qemu, ai]
    if: always() && needs.initramfs.result == 'success' && needs.rootfs.result == 'success' && needs.qemu.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.branch }}" }

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }

      - uses: android-actions/setup-android@v3

      # Download every artifact into the right place. The AI artifact is
      # optional — if its job failed, we skip the download and ship without
      # the llama-server binary. The Settings panel surfaces this clearly.
      - name: Download kernel + initramfs assets
        uses: actions/download-artifact@v4
        with:
          name: assets-initramfs
          path: app/src/main/assets
      - name: Download Kali rootfs asset
        uses: actions/download-artifact@v4
        with:
          name: assets-rootfs
          path: app/src/main/assets
      - name: Download QEMU jniLibs
        uses: actions/download-artifact@v4
        with:
          name: jnilibs-qemu
          path: app/src/main/jniLibs/arm64-v8a
      - name: Download QEMU assets (BIOS, keymaps)
        uses: actions/download-artifact@v4
        with:
          name: assets-qemu
          path: app/src/main/assets/qemu
      - name: Download AI jniLibs (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: jnilibs-ai
          path: app/src/main/jniLibs/arm64-v8a

      - name: Report AI engine inclusion
        run: |
          if [ -f app/src/main/jniLibs/arm64-v8a/libllama-server.so ]; then
            echo "✓ libllama-server.so included ($(du -h app/src/main/jniLibs/arm64-v8a/libllama-server.so | cut -f1))"
          else
            echo "⚠ libllama-server.so missing — APK will ship without AI engine"
          fi

      - name: Decode release keystore
        if: inputs.build_type == 'release'
        run: |
          echo "${{ secrets.PODROID_RELEASE_KEYSTORE_BASE64 }}" \
            | base64 -d > "${{ runner.temp }}/podroid-release.jks"

      - name: Assemble APK
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew --no-daemon assembleRelease \
              -PPODROID_RELEASE_STORE_FILE="${{ runner.temp }}/podroid-release.jks" \
              -PPODROID_RELEASE_STORE_PASSWORD="${{ secrets.PODROID_RELEASE_STORE_PASSWORD }}" \
              -PPODROID_RELEASE_KEY_ALIAS="${{ secrets.PODROID_RELEASE_KEY_ALIAS }}" \
              -PPODROID_RELEASE_KEY_PASSWORD="${{ secrets.PODROID_RELEASE_KEY_PASSWORD }}"
          else
            ./gradlew --no-daemon assembleDebug
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: podroid-${{ inputs.build_type }}-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Publish Release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          gh release create "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --target "${{ inputs.branch }}" \
            --title "Podroid ${{ inputs.release_tag }}" \
            --generate-notes \
            "$APK"
